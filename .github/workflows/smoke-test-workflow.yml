name: Server Smoke Tests

permissions:
  contents: read

on:
  pull_request_target:
    types:
      - labeled
  # Run on pushes to any branch. Not triggered for forked repo PRs.
  push:
  schedule:
    # Run once a day at 9AM PDT (16 UTC) on mon-fri 
    # Last commit on default branch.
    # https://help.github.com/en/actions/reference/events-that-trigger-workflows#scheduled-events-schedule
    - cron:  '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.label.name == 'force-smoke'
    permissions: read-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        check-latest: true
    # This step can be removed when we drop support for Node 22
    - name: Upgrade npm
      if: matrix.node-version == '22.x'
      run: npm install -g npm@11
    - name: Install Dependencies
      run: npm install
    - name: Run Smoke Tests
      run: npm run smoke
      env:
        TEST_LICENSE: ${{ secrets.TEST_LICENSE }}
        LASP_LICENSE: ${{ secrets.LASP_LICENSE }}
        LASP_SECURE_LICENSE: ${{ secrets.LASP_SECURE_LICENSE }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

